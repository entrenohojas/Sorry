
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perdón, mi amor</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #ffe7ef 0%, #ffd5e1 40%, #ffc0d0 100%);
        color: #7a1138;
      }

      .card {
        width: min(92vw, 620px);
        background: rgba(255, 255, 255, 0.88);
        border-radius: 24px;
        box-shadow: 0 18px 38px rgba(122, 17, 56, 0.25);
        padding: 2rem 1.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 4vw, 2rem);
        line-height: 1.45;
      }

      .heart {
        margin-top: 1.8rem;
        width: min(280px, 70vw);
        filter: drop-shadow(0 10px 10px rgba(122, 17, 56, 0.2));
      }

      p {
        margin-top: 1rem;
        font-size: 1rem;
        color: #9e2f56;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>
        Me puedes perdonar por favor?<br />
        Yo te amo mucho mi niña de mis ojos, Majito mi amor, I´m very sorry.
      </h1>

      <img
        class="heart"
        src="sad-heart.svg"
        alt="Corazón triste"
      />

      <p>Con todo mi corazón 💗</p>
    </main>
  </body>
</html>
