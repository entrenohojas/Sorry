
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perdón, mi amor</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #ffe7ef 0%, #ffd5e1 40%, #ffc0d0 100%);
        color: #7a1138;
      }

      .card {
        width: min(92vw, 620px);
        background: rgba(255, 255, 255, 0.88);
        border-radius: 24px;
        box-shadow: 0 18px 38px rgba(122, 17, 56, 0.25);
        padding: 2rem 1.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 4vw, 2rem);
        line-height: 1.45;
      }

      .heart {
        margin-top: 1.8rem;
        width: min(280px, 70vw);
        filter: drop-shadow(0 10px 10px rgba(122, 17, 56, 0.2));
      }

      p {
        margin-top: 1rem;
        font-size: 1rem;
        color: #9e2f56;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>
        Me puedes perdonar por favor?<br />
        Yo te amo mucho mi niña de mis ojos, Majito mi amor, I´m very sorry.
      </h1>

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" role="img" aria-labelledby="t d" class="heart">
  <title id="t">Corazón triste</title>
  <desc id="d">Ilustración de un corazón rojo con expresión triste</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff5a7f"/>
      <stop offset="1" stop-color="#d61e54"/>

  </defs>
  <path d="M150 238c-4-2-10-6-17-12C67 173 24 132 24 84 24 49 52 21 87 21c24 0 47 13 63 34 16-21 39-34 63-34 35 0 63 28 63 63 0 48-43 89-109 142-7 6-13 10-17 12z" fill="url(#g)" stroke="#a7113f" stroke-width="4"/>
  <ellipse cx="118" cy="118" rx="7" ry="10" fill="#5a0a24"/>

  <path d="M112 162c11-15 24-22 38-22s27 7 38 22" fill="none" stroke="#5a0a24" stroke-width="7" stroke-linecap="round"/>
  <path d="M95 129c-9 7-15 16-18 28" fill="none" stroke="#8e1538" stroke-width="5" stroke-linecap="round"/>

      <p>Con todo mi corazón 💗</p>
    </main>
  
<!-- YOUTUBE_IFRAME_API_SOUND -->
<!-- Reproductor oculto (200x200 mínimo recomendado por la API) -->
<div id="yt-audio"
     style="position:fixed; left:-9999px; top:-9999px; width:200px; height:200px; overflow:hidden;"></div>

<!-- Botón visible para iniciar audio (por políticas del navegador suele requerir interacción) -->
<button id="musicBtn"
        style="position:fixed; right:16px; bottom:16px; z-index:9999; padding:12px 14px; border-radius:999px;
               border:1px solid rgba(255,255,255,.25); background:rgba(0,0,0,.55); color:#fff; cursor:pointer;
               font:600 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;">
  ▶️ Música (2:30–3:30)
</button>

<script>
  // Carga la API oficial de YouTube IFrame
  (function loadYT(){
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  })();

  // Video y rango solicitado: 2:30 (150s) a 3:30 (210s)
  var YT_VIDEO_ID = "A2Ro1OkjY8U";
  var START_AT = 150;
  var END_AT = 210;

  var player = null;
  var stopTimer = null;

  function startSegment(){
    if (!player) return;
    // Nota: muchos navegadores bloquean autoplay con sonido si no hay click.
    player.seekTo(START_AT, true);
    player.playVideo();

    // Detener exactamente en END_AT
    if (stopTimer) clearInterval(stopTimer);
    stopTimer = setInterval(function(){
      try{
        var t = player.getCurrentTime();
        if (t >= END_AT){
          player.pauseVideo();
          player.seekTo(START_AT, true);
          clearInterval(stopTimer);
          stopTimer = null;
        }
      } catch(e){}
    }, 250);
  }

  function toggleMusic(){
    if (!player) return;
    var state = player.getPlayerState();
    // -1 unstarted, 1 playing, 2 paused
    if (state === 1){
      player.pauseVideo();
      document.getElementById("musicBtn").textContent = "▶️ Música (2:30–3:30)";
    } else {
      startSegment();
      document.getElementById("musicBtn").textContent = "⏸ Pausar música";
    }
  }

  // Callback requerido por la API
  function onYouTubeIframeAPIReady(){
    player = new YT.Player('yt-audio', {
      width: 200,
      height: 200,
      videoId: YT_VIDEO_ID,
      playerVars: {
        start: START_AT,
        controls: 0,
        rel: 0,
        modestbranding: 1,
        playsinline: 1
      },
      events: {
        onReady: function(){
          // No forzamos autoplay con sonido para evitar bloqueo del navegador.
          // El usuario inicia con el botón.
        }
      }
    });
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  // Botón
  document.addEventListener("DOMContentLoaded", function(){
    var btn = document.getElementById("musicBtn");
    btn.addEventListener("click", toggleMusic, { passive: true });
  });
</script>

</body>
</html>
